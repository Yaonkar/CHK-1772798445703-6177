<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile - MovieMark</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

    
<div class="profile-container">

<div class="profile-card">

<div class="profile-header">

<img src="https://via.placeholder.com/120" id="profileImage">

<h2 id="username">User Name</h2>

<p id="userrole">Filmmaker</p>

</div>

<div class="profile-info">

<h3>Bio</h3>
<p id="userbio">
Passionate filmmaker who loves storytelling and collaboration.
</p>

<h3>Joined</h3>
<p id="joinedDate">2026</p>

</div>

<button class="edit-btn">Edit Profile</button>

</div>


<div class="profile-projects">

<h2>My Projects</h2>

<div class="project-section">

<h3>Uploaded Scripts</h3>

<ul id="scriptList">

<li>Short Film Script - The Last Scene</li>
<li>Drama Script - Silent Voice</li>

</ul>

</div>


<div class="project-section">

<h3>Uploaded Films</h3>

<ul id="filmList">

<li>The Last Scene</li>
<li>Broken Memories</li>

</ul>

</div>

</div>

</div>

<script src="js/dashboard.js"></script>

</body>

</html>
