<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MovieMark Admin Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="admin-login-page">
    <div class="admin-login-card">
      <div class="logo-box">
        <h1>MovieMark</h1>
        <p>Admin Panel Access</p>
      </div>

      <form class="admin-login-form" id="adminLoginForm">
        <h2>Admin Login</h2>

        <div class="input-group">
          <label for="adminEmail">Email</label>
          <input type="email" id="adminEmail" placeholder="Enter admin email" required />
        </div>

        <div class="input-group">
          <label for="adminPassword">Password</label>
          <input type="password" id="adminPassword" placeholder="Enter password" required />
        </div>

        <div class="options-row">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">Login</button>
        <p class="login-message" id="loginMessage"></p>
      </form>
    </div>
  </div>

  <script src="js/adminAuth.js"></script>
</body>
</html>
