<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MovieMark | Requests</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<section class="requests-page">

<div class="requests-container">

<div class="requests-header">
<h1>Collaboration Requests</h1>
<p>Manage your collaboration invitations.</p>
</div>


<div class="requests-list" id="requestsList">


<div class="request-card">

<div class="request-info">
<h3>Short Film Project</h3>
<p><strong>Creator:</strong> Rahul Patil</p>
<p><strong>Role:</strong> Actor</p>
<p>Looking for an actor for a short emotional film.</p>
</div>

<div class="request-actions">
<button class="accept-btn">Accept</button>
<button class="reject-btn">Reject</button>
</div>

</div>


<div class="request-card">

<div class="request-info">
<h3>Thriller Script</h3>
<p><strong>Creator:</strong> Neha Sharma</p>
<p><strong>Role:</strong> Editor</p>
<p>Need an editor to help finalize the short film.</p>
</div>

<div class="request-actions">
<button class="accept-btn">Accept</button>
<button class="reject-btn">Reject</button>
</div>

</div>


</div>

</div>

</section>

<script src="js/requests.js"></script>

</body>
</html>
