<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MovieMark | Collaboration Requests</title>

<style>

/* GLOBAL */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
min-height:100vh;
background:
radial-gradient(circle at top left,#1e3a8a,#020617 70%);
color:white;
padding:40px;
}

/* PAGE */

.requests-page{
display:flex;
justify-content:center;
}

.requests-container{
width:100%;
max-width:900px;
}

/* HEADER */

.requests-header{
text-align:center;
margin-bottom:30px;
}

.requests-header h1{
font-size:34px;

background:linear-gradient(90deg,#fbbf24,#60a5fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.requests-header p{
color:#cbd5e1;
margin-top:5px;
}

/* REQUEST LIST */

.requests-list{
display:flex;
flex-direction:column;
gap:20px;
}

/* CARD */

.request-card{

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);

border-radius:16px;
padding:20px;

backdrop-filter:blur(10px);

box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

/* INFO */

.request-info h3{
margin-bottom:5px;
color:#fbbf24;
}

.request-info p{
font-size:14px;
color:#cbd5e1;
margin-top:2px;
}

/* ACTIONS */

.request-actions{
display:flex;
gap:10px;
}

/* BUTTONS */

.accept-btn{
background:linear-gradient(135deg,#22c55e,#15803d);
border:none;
padding:8px 16px;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:600;
}

.reject-btn{
background:linear-gradient(135deg,#ef4444,#991b1b);
border:none;
padding:8px 16px;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:600;
}

.accept-btn:hover,
.reject-btn:hover{
transform:translateY(-2px);
}

/* EMPTY */

.empty{
text-align:center;
color:#94a3b8;
margin-top:20px;
}

/* RESPONSIVE */

@media(max-width:700px){

.request-card{
flex-direction:column;
align-items:flex-start;
gap:15px;
}

.request-actions{
width:100%;
}

.accept-btn,
.reject-btn{
flex:1;
}

}

</style>

</head>

<body>

<section class="requests-page">

<div class="requests-container">

<div class="requests-header">
<h1>Collaboration Requests</h1>
<p>Manage your collaboration invitations.</p>
</div>

<div class="requests-list" id="requestsList">

<div class="empty">Loading requests...</div>

</div>

</div>

</section>

<script>

/* API */

const API="http://localhost:5000/api";

/* TOKEN */

function getToken(){
return localStorage.getItem("token");
}

/* LOAD REQUESTS */

async function loadRequests(){

const list=document.getElementById("requestsList");

try{

const res=await fetch(API+"/requests/received",{
headers:{
Authorization:"Bearer "+getToken()
}
});

const data=await res.json();

const requests=data.requests || [];

if(!requests.length){

list.innerHTML='<div class="empty">No requests found</div>';
return;

}

list.innerHTML=requests.map(req=>`

<div class="request-card">

<div class="request-info">

<h3>${req.projectTitle}</h3>

<p><strong>Creator:</strong> ${req.sender?.name || "Unknown"}</p>

<p><strong>Role:</strong> ${req.role}</p>

<p>${req.message || ""}</p>

</div>

<div class="request-actions">

<button class="accept-btn" onclick="updateRequest('${req._id}','accepted')">
Accept
</button>

<button class="reject-btn" onclick="updateRequest('${req._id}','rejected')">
Reject
</button>

</div>

</div>

`).join("");

}catch(err){

list.innerHTML='<div class="empty">Failed to load requests</div>';

}

}

/* UPDATE REQUEST */

async function updateRequest(id,status){

try{

await fetch(API+"/requests/"+id,{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+getToken()
},
body:JSON.stringify({status})
});

loadRequests();

}catch(err){

alert("Action failed");

}

}

/* INIT */

loadRequests();

</script>

</body>
</html>
