<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - MovieMark</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI", Arial, sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#020617,#0f172a,#172554);
padding:40px;
color:white;
}

.contact-wrapper{
display:grid;
grid-template-columns:1.3fr 1fr;
gap:40px;
max-width:1100px;
width:100%;
background:rgba(255,255,255,0.05);
border-radius:18px;
padding:40px;
backdrop-filter:blur(10px);
box-shadow:0 20px 45px rgba(0,0,0,0.45);
}

.brand-title{
font-size:34px;
margin-bottom:5px;
color:#fbbf24;
}

.subtitle{
margin:10px 0 25px;
color:#cbd5e1;
line-height:1.5;
}

.contact-form{
display:flex;
flex-direction:column;
gap:15px;
}

.form-row{
display:flex;
gap:12px;
}

.contact-form input,
.contact-form textarea{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
outline:none;
font-size:14px;
transition:0.2s;
}

.contact-form textarea{
height:120px;
resize:none;
}

.contact-form input::placeholder,
.contact-form textarea::placeholder{
color:#94a3b8;
}

.contact-form input:focus,
.contact-form textarea:focus{
background:rgba(255,255,255,0.12);
}

.contact-btn{
background:linear-gradient(90deg,#f59e0b,#7c3aed);
border:none;
padding:13px;
border-radius:10px;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.contact-btn:hover{
transform:translateY(-2px);
box-shadow:0 12px 25px rgba(0,0,0,0.4);
}

.contact-right{
display:flex;
flex-direction:column;
gap:18px;
}

.contact-card{
background:rgba(255,255,255,0.06);
padding:18px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
}

.contact-card strong{
color:#fbbf24;
}

.contact-illustration{
font-size:40px;
text-align:center;
margin-top:10px;
opacity:0.8;
}

.form-message{
min-height:22px;
font-size:14px;
font-weight:600;
text-align:center;
margin-top:5px;
}

@media(max-width:900px){
.contact-wrapper{
grid-template-columns:1fr;
}

.form-row{
flex-direction:column;
}
}
</style>
</head>

<body>

<div class="contact-wrapper">

  <div class="contact-left">
    <h1 class="brand-title">🎬 MovieMark</h1>
    <h2>Contact Us</h2>

    <p class="subtitle">
      Have questions or collaboration ideas? Send us a message and our team will respond soon.
    </p>

    <form id="contactForm" class="contact-form">
      <div class="form-row">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
      </div>

      <input type="text" id="subject" placeholder="Subject">
      <textarea id="message" placeholder="Your Message..." required></textarea>

      <button type="submit" class="contact-btn">Send Message</button>
      <p id="formMessage" class="form-message"></p>
    </form>
  </div>

  <div class="contact-right">
    <h3>Other Contact Options</h3>

    <div class="contact-card">
      <p><strong>Email</strong></p>
      <p>support@moviemark.com</p>
    </div>

    <div class="contact-card">
      <p><strong>Phone</strong></p>
      <p>+91 9876543210</p>
    </div>

    <div class="contact-card">
      <p><strong>Location</strong></p>
      <p>Pune, India</p>
    </div>

    <div class="contact-illustration">🎥 ✨</div>
  </div>

</div>

<script>
const API_BASE_URL = "http://localhost:5000/api";

const form = document.getElementById("contactForm");
const formMessage = document.getElementById("formMessage");

form.addEventListener("submit", async function(e){
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const subject = document.getElementById("subject").value.trim();
  const message = document.getElementById("message").value.trim();

  formMessage.textContent = "Sending message...";
  formMessage.style.color = "#ffffff";

  try {
    const response = await fetch(`${API_BASE_URL}/contact`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        email,
        subject,
        message
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.message || "Failed to send message");
    }

    formMessage.textContent = data.message || "Message sent successfully";
    formMessage.style.color = "lightgreen";
    form.reset();
  } catch (error) {
    formMessage.textContent = error.message || "Server error";
    formMessage.style.color = "red";
  }
});
</script>

</body>
</html>
